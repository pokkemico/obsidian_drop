<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Obsidian Drop</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f5f5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-surface:   #f5f5f5;
      --bg-sheet:     #f0f0f0;
      --border:       #e0e0e0;
      --border-light: #ebebeb;
      --text:         #1a1a1a;
      --text-muted:   #7a7a7a;
      --text-faint:   #c0c0c0;
      --accent:       #7b6cd8;
      --accent-hover: #6a5bc7;
      --accent-dim:   rgba(123,108,216,0.10);
      --danger:       #d94a4a;
      --header-h:     44px;
      --nav-h:        52px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 認証画面 ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
    }
    #auth-screen h1 { font-size: 24px; color: var(--accent); }
    #auth-screen p  { color: var(--text-muted); font-size: 13px; }
    #auth-btn {
      padding: 12px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #auth-btn:hover { background: var(--accent-hover); }

    /* ── メイン画面 ── */
    #main-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── ヘッダー ── */
    header {
      display: flex;
      align-items: center;
      gap: 2px;
      height: var(--header-h);
      padding: 0 6px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .hdr-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      line-height: 1;
      flex-shrink: 0;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hdr-btn:hover  { background: var(--border-light); color: var(--text); }
    .hdr-btn.active { color: var(--accent); }

    /* パネルアイコン（CSS描画） */
    #sidebar-toggle .panel-icon {
      width: 18px;
      height: 14px;
      border: 1.5px solid currentColor;
      border-radius: 2px;
      display: flex;
      overflow: hidden;
      gap: 0;
    }
    #sidebar-toggle .panel-icon::before {
      content: '';
      width: 5px;
      background: currentColor;
      flex-shrink: 0;
    }

    #filename {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 6px;
    }

    #save-status {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      padding-right: 4px;
    }

    /* ── エディタエリア ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #editor {
      flex: 1;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 20px 24px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.8;
      resize: none;
      outline: none;
      caret-color: var(--accent);
    }

    #preview {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      line-height: 1.7;
    }

    #preview h1, #preview h2, #preview h3 { margin: 1.2em 0 0.6em; color: #e0e0e0; }
    #preview h1 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    #preview p  { margin: 0.8em 0; }
    #preview a  { color: var(--accent); }
    #preview code { background: var(--bg-surface); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    #preview pre  { background: var(--bg-surface); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 1em 0; }
    #preview pre code { background: none; padding: 0; }
    #preview blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 1em 0; }
    #preview ul, #preview ol { padding-left: 1.5em; margin: 0.8em 0; }
    #preview li { margin: 0.3em 0; }
    #preview hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #preview th, #preview td { border: 1px solid var(--border); padding: 6px 12px; }
    #preview th { background: var(--bg-surface); }

    .wikilink {
      display: inline-block;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.85em;
      color: var(--text-muted);
    }

    /* ── ボトムナビ ── */
    #bottom-nav {
      display: flex;
      align-items: center;
      height: var(--nav-h);
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      height: 100%;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s;
    }
    .nav-btn:hover  { color: var(--text); }
    .nav-btn:active { background: var(--border-light); }
    .nav-btn:disabled { color: var(--text-faint); pointer-events: none; }
    .nav-btn.active { color: var(--accent); }

    /* タブカウントボタン */
    #nav-tabs .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      border: 1.5px solid currentColor;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 0 3px;
    }

    /* ── シートオーバーレイ ── */
    #sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 10;
    }

    /* ── ボトムシート ── */
    #bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72vh;
      max-height: calc(100% - 56px);
      background: var(--bg-sheet);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    #bottom-sheet.open { transform: translateY(0); }

    /* ドラッグハンドル */
    #sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 4px;
      flex-shrink: 0;
    }

    /* シートツールバー */
    #sheet-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 4px 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sheet-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 19px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-btn:hover  { background: var(--border-light); color: var(--text); }
    .sheet-btn:active { background: var(--border); }

    /* セクションヘッダー */
    #sheet-section {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }
    #sheet-section .sec-label {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #sheet-section .sec-chevron { font-size: 12px; color: var(--text-faint); }

    /* Vaultヘッダー */
    #sheet-vault {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #vault-info-wrap { flex: 1; }
    #vault-name { font-size: 14px; font-weight: 700; color: var(--text); }
    #vault-count { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    #settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 17px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    #settings-btn:hover { color: var(--text); }

    /* ファイルツリー */
    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #file-tree::-webkit-scrollbar { width: 4px; }
    #file-tree::-webkit-scrollbar-track { background: transparent; }
    #file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px 5px 0;
      cursor: pointer;
      border-radius: 4px;
      margin: 1px 4px;
      font-size: 13px;
      user-select: none;
      -webkit-user-select: none;
      color: var(--text);
    }
    .tree-item:hover  { background: var(--border-light); }
    .tree-item.active { background: var(--accent-dim); color: var(--accent); }
    .tree-item.active .tree-icon { color: var(--accent); }

    .tree-arrow {
      width: 16px;
      text-align: center;
      font-size: 9px;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .tree-icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      color: var(--text-muted);
    }
    .tree-icon.folder { color: #c49a2a; }
    .tree-item.active .tree-icon.folder { color: var(--accent); }

    .tree-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .tree-children { border-left: 1px solid var(--border-light); margin-left: 18px; }

    /* ── モーダル ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #modal h3 { font-size: 14px; }
    #modal input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      width: 100%;
    }
    #modal input:focus { border-color: var(--accent); }
    #modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .btn { padding: 6px 16px; border-radius: 4px; border: none; font-size: 13px; cursor: pointer; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger    { background: var(--danger); color: #fff; }

    /* ── トースト通知 ── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #444;
      color: var(--text);
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 50;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }

    /* ── コンテキストメニュー ── */
    #context-menu {
      position: fixed;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      z-index: 40;
      overflow: hidden;
      min-width: 140px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .context-item { padding: 10px 16px; cursor: pointer; font-size: 13px; }
    .context-item:hover { background: var(--border); }
    .context-item.danger { color: var(--danger); }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<!-- 認証画面 -->
<div id="auth-screen">
  <h1>Obsidian Drop</h1>
  <p>Dropboxに接続してObsidian Vaultを編集</p>
  <button id="auth-btn">Dropboxでログイン</button>
</div>

<!-- メイン画面 -->
<div id="main-screen" hidden>

  <header>
    <button id="sidebar-toggle" class="hdr-btn" aria-label="ファイルツリー">
      <span class="panel-icon"></span>
    </button>
    <span id="filename">ファイルを選択してください</span>
    <span id="save-status"></span>
    <button id="preview-btn" class="hdr-btn" title="プレビュー切り替え">◎</button>
    <button id="more-btn" class="hdr-btn" title="その他">⋮</button>
  </header>

  <main>
    <textarea id="editor" placeholder="ファイルを選択してください" spellcheck="false"></textarea>
    <div id="preview" hidden></div>
  </main>

  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-back"    title="戻る" disabled>‹</button>
    <button class="nav-btn" id="nav-forward" title="進む" disabled>›</button>
    <button class="nav-btn" id="nav-search"  title="検索">⌕</button>
    <button class="nav-btn" id="nav-new"     title="新規ファイル">＋</button>
    <button class="nav-btn" id="nav-tabs"    title="開いているファイル"><span class="tab-badge">1</span></button>
    <button class="nav-btn" id="nav-menu"    title="ファイルツリー">≡</button>
  </nav>

</div>

<!-- シートオーバーレイ -->
<div id="sheet-overlay" hidden></div>

<!-- ボトムシート（ファイルエクスプローラー） -->
<div id="bottom-sheet" aria-label="ファイルエクスプローラー">
  <div id="sheet-handle"></div>

  <div id="sheet-toolbar">
    <button class="sheet-btn" id="new-file-btn"   title="新規ファイル">✏</button>
    <button class="sheet-btn" id="new-folder-btn"  title="新規フォルダ">📁</button>
    <button class="sheet-btn" id="sort-btn"        title="並び替え">↕</button>
    <button class="sheet-btn" id="layout-btn"      title="表示切替">⊞</button>
    <button class="sheet-btn" id="collapse-all-btn" title="すべて折りたたむ">⇅</button>
  </div>

  <div id="sheet-section">
    <span class="sec-label">📁 ファイルエクスプローラー</span>
    <span class="sec-chevron">◊</span>
  </div>

  <div id="sheet-vault">
    <div id="vault-info-wrap">
      <div id="vault-name">Obsidian_Vault</div>
      <div id="vault-count">読み込み中…</div>
    </div>
    <button id="settings-btn" title="設定">⚙</button>
  </div>

  <div id="file-tree"></div>
</div>

<!-- モーダル -->
<div id="modal-overlay" hidden>
  <div id="modal">
    <h3 id="modal-title"></h3>
    <input id="modal-input" type="text" autocomplete="off">
    <div id="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">キャンセル</button>
      <button class="btn btn-primary"   id="modal-ok">作成</button>
    </div>
  </div>
</div>

<!-- コンテキストメニュー -->
<div id="context-menu" hidden></div>

<!-- トースト -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 定数
// ═══════════════════════════════════════════

const CLIENT_ID    = 'yzgitq8dckav2q8';
const REDIRECT_URI = 'https://pokkemico.github.io/obsidian_drop/';
const VAULT_ROOT   = '/Obsidian_Vault';

const KEYS = {
  ACCESS_TOKEN:  'dbx_access_token',
  REFRESH_TOKEN: 'dbx_refresh_token',
  EXPIRES_AT:    'dbx_expires_at',
  CODE_VERIFIER: 'dbx_code_verifier',
};

// ═══════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════

const authScreen     = document.getElementById('auth-screen');
const mainScreen     = document.getElementById('main-screen');
const authBtn        = document.getElementById('auth-btn');
const sidebarToggle  = document.getElementById('sidebar-toggle');
const sheetOverlay   = document.getElementById('sheet-overlay');
const bottomSheet    = document.getElementById('bottom-sheet');
const filenameEl     = document.getElementById('filename');
const saveStatusEl   = document.getElementById('save-status');
const editor         = document.getElementById('editor');
const preview        = document.getElementById('preview');
const previewBtn     = document.getElementById('preview-btn');
const fileTree       = document.getElementById('file-tree');
const newFileBtn     = document.getElementById('new-file-btn');
const newFolderBtn   = document.getElementById('new-folder-btn');
const collapseAllBtn = document.getElementById('collapse-all-btn');
const vaultCount     = document.getElementById('vault-count');
const navBackBtn     = document.getElementById('nav-back');
const navForwardBtn  = document.getElementById('nav-forward');
const navMenuBtn     = document.getElementById('nav-menu');
const navNewBtn      = document.getElementById('nav-new');
const navTabsBtn     = document.getElementById('nav-tabs');
const modalOverlay   = document.getElementById('modal-overlay');
const modalTitle     = document.getElementById('modal-title');
const modalInput     = document.getElementById('modal-input');
const modalCancel    = document.getElementById('modal-cancel');
const modalOk        = document.getElementById('modal-ok');
const toastEl        = document.getElementById('toast');

let dbx = null;

// ═══════════════════════════════════════════
// 認証
// ═══════════════════════════════════════════

function saveTokens(accessToken, refreshToken, expiresIn) {
  localStorage.setItem(KEYS.ACCESS_TOKEN, accessToken);
  if (refreshToken) localStorage.setItem(KEYS.REFRESH_TOKEN, refreshToken);
  const expiresAt = Date.now() + (expiresIn - 60) * 1000;
  localStorage.setItem(KEYS.EXPIRES_AT, String(expiresAt));
}

function loadTokens() {
  return {
    accessToken:  localStorage.getItem(KEYS.ACCESS_TOKEN),
    refreshToken: localStorage.getItem(KEYS.REFRESH_TOKEN),
    expiresAt:    parseInt(localStorage.getItem(KEYS.EXPIRES_AT) || '0'),
  };
}

function clearTokens() {
  Object.values(KEYS).forEach((k) => localStorage.removeItem(k));
}

function isTokenFresh(tokens) {
  return tokens.accessToken && Date.now() < tokens.expiresAt;
}

async function refreshAccessToken(refreshToken) {
  const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type:    'refresh_token',
      refresh_token: refreshToken,
      client_id:     CLIENT_ID,
    }),
  });
  if (!res.ok) throw new Error('トークンのリフレッシュに失敗しました');
  const data = await res.json();
  saveTokens(data.access_token, data.refresh_token, data.expires_in);
  return data.access_token;
}

async function getValidAccessToken() {
  const tokens = loadTokens();
  if (!tokens.accessToken) throw new Error('未認証');
  if (isTokenFresh(tokens)) return tokens.accessToken;
  if (tokens.refreshToken) return await refreshAccessToken(tokens.refreshToken);
  throw new Error('再認証が必要です');
}

function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generateCodeChallenge(verifier) {
  const data   = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function startAuth() {
  const verifier  = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem(KEYS.CODE_VERIFIER, verifier);
  const params = new URLSearchParams({
    client_id:             CLIENT_ID,
    response_type:         'code',
    redirect_uri:          REDIRECT_URI,
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    token_access_type:     'offline',
  });
  window.location.href = `https://www.dropbox.com/oauth2/authorize?${params}`;
}

async function handleCallback(code) {
  const verifier = localStorage.getItem(KEYS.CODE_VERIFIER);
  if (!verifier) throw new Error('認証セッションが無効です。再度ログインしてください');
  const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      code,
      grant_type:    'authorization_code',
      client_id:     CLIENT_ID,
      redirect_uri:  REDIRECT_URI,
      code_verifier: verifier,
    }),
  });
  if (!res.ok) throw new Error('認証に失敗しました');
  const data = await res.json();
  saveTokens(data.access_token, data.refresh_token, data.expires_in);
  localStorage.removeItem(KEYS.CODE_VERIFIER);
  window.history.replaceState({}, '', REDIRECT_URI);
  return data.access_token;
}

function createDbxClient(accessToken) {
  dbx = new Dropbox.Dropbox({ accessToken });
}

function showAuthScreen() { authScreen.hidden = false; mainScreen.hidden = true; }
function showMainScreen()  {
  authScreen.hidden = true;
  mainScreen.hidden = false;
  loadFileTree();
  openSheet();
}

async function boot() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  if (code) {
    try {
      const accessToken = await handleCallback(code);
      createDbxClient(accessToken);
      showMainScreen();
    } catch (e) {
      showToast(e.message, true);
      showAuthScreen();
    }
    return;
  }
  const tokens = loadTokens();
  if (tokens.accessToken) {
    try {
      const accessToken = await getValidAccessToken();
      createDbxClient(accessToken);
      showMainScreen();
    } catch {
      clearTokens();
      showAuthScreen();
    }
    return;
  }
  showAuthScreen();
}

authBtn.addEventListener('click', startAuth);

// ═══════════════════════════════════════════
// ボトムシート開閉
// ═══════════════════════════════════════════

let sheetJustOpened = false;

function openSheet() {
  bottomSheet.classList.add('open');
  sheetOverlay.hidden = false;
  sheetJustOpened = true;
  setTimeout(() => { sheetJustOpened = false; }, 300);
}

function closeSheet() {
  bottomSheet.classList.remove('open');
  sheetOverlay.hidden = true;
}

sidebarToggle.addEventListener('click', openSheet);
navMenuBtn.addEventListener('click', openSheet);
navTabsBtn.addEventListener('click', openSheet);
sheetOverlay.addEventListener('click', () => {
  if (!sheetJustOpened) closeSheet();
});

// ═══════════════════════════════════════════
// ナビゲーション履歴
// ═══════════════════════════════════════════

let navHistory = [];
let navIndex   = -1;

function pushNav(path) {
  navHistory = navHistory.slice(0, navIndex + 1);
  navHistory.push(path);
  navIndex = navHistory.length - 1;
  updateNavBtns();
}

function updateNavBtns() {
  navBackBtn.disabled    = navIndex <= 0;
  navForwardBtn.disabled = navIndex >= navHistory.length - 1;
}

navBackBtn.addEventListener('click', async () => {
  if (navIndex > 0) {
    navIndex--;
    await loadFileAtPath(navHistory[navIndex]);
    updateNavBtns();
  }
});

navForwardBtn.addEventListener('click', async () => {
  if (navIndex < navHistory.length - 1) {
    navIndex++;
    await loadFileAtPath(navHistory[navIndex]);
    updateNavBtns();
  }
});

navNewBtn.addEventListener('click', () => {
  openSheet();
  setTimeout(() => newFileBtn.click(), 300);
});

document.getElementById('nav-search').addEventListener('click', openSheet);

// ═══════════════════════════════════════════
// ファイルツリー
// ═══════════════════════════════════════════

async function listAllEntries(path) {
  const entries = [];
  let res = await dbx.filesListFolder({ path, recursive: true });
  entries.push(...res.result.entries);
  while (res.result.has_more) {
    res = await dbx.filesListFolderContinue({ cursor: res.result.cursor });
    entries.push(...res.result.entries);
  }
  return entries;
}

function buildTree(entries) {
  const vaultKey = VAULT_ROOT.toLowerCase();
  const children = { [vaultKey]: [] };
  for (const e of entries) {
    if (e.name.startsWith('.')) continue;
    const parent = e.path_lower.substring(0, e.path_lower.lastIndexOf('/'));
    if (!children[parent]) children[parent] = [];
    if (e['.tag'] === 'folder') {
      if (!children[e.path_lower]) children[e.path_lower] = [];
      children[parent].push(e);
    } else if (e['.tag'] === 'file' && e.name.endsWith('.md')) {
      children[parent].push(e);
    }
  }
  return children;
}

let treeData    = {};
let openFolders = new Set();

function renderTree(parentPath, container, depth = 0) {
  const items = treeData[parentPath] || [];
  items.sort((a, b) => {
    if (a['.tag'] !== b['.tag']) return a['.tag'] === 'folder' ? -1 : 1;
    if (a['.tag'] === 'folder') return a.name.localeCompare(b.name, 'ja');
    return new Date(b.server_modified || 0) - new Date(a.server_modified || 0);
  });

  for (const item of items) {
    const el = document.createElement('div');
    el.className = 'tree-item';
    el.style.paddingLeft = `${12 + depth * 14}px`;

    if (item['.tag'] === 'folder') {
      const isOpen = openFolders.has(item.path_lower);
      el.innerHTML = `<span class="tree-arrow">${isOpen ? '▾' : '▸'}</span><span class="tree-icon folder">📁</span><span class="tree-label">${item.name}</span>`;
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      childContainer.hidden    = !isOpen;
      el.addEventListener('click', () => toggleFolder(item.path_lower, el, childContainer, depth));
      addLongPress(el, () => showContextMenu(item, el));
      container.appendChild(el);
      container.appendChild(childContainer);
      if (isOpen) renderTree(item.path_lower, childContainer, depth + 1);
    } else {
      el.innerHTML = `<span class="tree-arrow"></span><span class="tree-icon">📝</span><span class="tree-label">${item.name.replace(/\.md$/, '')}</span>`;
      el.dataset.path = item.path_display;
      el.addEventListener('click', () => selectFile(item.path_display, el));
      addLongPress(el, () => showContextMenu(item, el));
      container.appendChild(el);
    }
  }
}

function toggleFolder(path, el, childContainer, depth) {
  if (openFolders.has(path)) {
    openFolders.delete(path);
    el.querySelector('.tree-arrow').textContent = '▸';
    childContainer.hidden    = true;
    childContainer.innerHTML = '';
  } else {
    openFolders.add(path);
    el.querySelector('.tree-arrow').textContent = '▾';
    childContainer.hidden = false;
    renderTree(path, childContainer, depth + 1);
  }
}

async function loadFileTree() {
  fileTree.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px">読み込み中…</div>';
  vaultCount.textContent = '読み込み中…';
  try {
    const entries = await listAllEntries(VAULT_ROOT);
    treeData = buildTree(entries);
    fileTree.innerHTML = '';
    renderTree(VAULT_ROOT.toLowerCase(), fileTree);
    const fileCount   = entries.filter(e => e['.tag'] === 'file' && e.name.endsWith('.md')).length;
    const folderCount = entries.filter(e => e['.tag'] === 'folder').length;
    vaultCount.textContent = `${fileCount} ファイル, ${folderCount} フォルダ`;
  } catch (e) {
    fileTree.innerHTML = `<div style="padding:12px;color:var(--danger);font-size:12px">${e.message}</div>`;
    vaultCount.textContent = '';
  }
}

collapseAllBtn.addEventListener('click', () => {
  openFolders.clear();
  fileTree.innerHTML = '';
  renderTree(VAULT_ROOT.toLowerCase(), fileTree);
});

// ═══════════════════════════════════════════
// ファイル選択・読み込み
// ═══════════════════════════════════════════

let currentPath = null;
let currentEl   = null;

async function selectFile(path, el) {
  if (currentPath === path) { closeSheet(); return; }
  if (isDirty) {
    const ok = await confirmUnsaved();
    if (!ok) return;
  }
  if (currentEl) currentEl.classList.remove('active');
  el.classList.add('active');
  currentEl   = el;
  currentPath = path;
  filenameEl.textContent = path.split('/').pop().replace(/\.md$/, '');
  closeSheet();
  pushNav(path);
  await loadFileContent(path);
}

async function loadFileAtPath(path) {
  const allEls = fileTree.querySelectorAll('[data-path]');
  let targetEl = null;
  for (const el of allEls) {
    if (el.dataset.path === path) { targetEl = el; break; }
  }
  if (currentEl) currentEl.classList.remove('active');
  if (targetEl)  { targetEl.classList.add('active'); currentEl = targetEl; }
  currentPath = path;
  filenameEl.textContent = path.split('/').pop().replace(/\.md$/, '');
  await loadFileContent(path);
}

async function loadFileContent(path) {
  editor.value       = '';
  editor.placeholder = '読み込み中…';
  try {
    const res  = await dbx.filesDownload({ path });
    const text = await res.result.fileBlob.text();
    editor.value       = text;
    editor.placeholder = '';
    if (!preview.hidden) renderPreview();
  } catch (e) {
    showToast('ファイルの読み込みに失敗しました', true);
  }
}

// ── 長押しコンテキストメニュー ──
function addLongPress(el, callback) {
  let timer = null;
  let moved  = false;
  el.addEventListener('touchstart', (e) => {
    moved = false;
    timer = setTimeout(() => { if (!moved) { e.preventDefault(); callback(); } }, 500);
  }, { passive: true });
  el.addEventListener('touchmove',   () => { moved = true; clearTimeout(timer); });
  el.addEventListener('touchend',    () => clearTimeout(timer));
  el.addEventListener('touchcancel', () => clearTimeout(timer));
  el.addEventListener('contextmenu', (e) => { e.preventDefault(); callback(); });
}

// ── コンテキストメニュー ──
const contextMenu = document.getElementById('context-menu');

function showContextMenu(item, anchorEl) {
  const rect = anchorEl.getBoundingClientRect();
  contextMenu.innerHTML = '';
  contextMenu.hidden    = false;
  const actions = [
    { label: '名前を変更', fn: () => renameItem(item) },
    ...(item['.tag'] === 'file' ? [{ label: '移動', fn: () => moveItem(item) }] : []),
    { label: '削除', fn: () => deleteItem(item), danger: true },
  ];
  for (const action of actions) {
    const btn = document.createElement('div');
    btn.className   = 'context-item' + (action.danger ? ' danger' : '');
    btn.textContent = action.label;
    btn.addEventListener('click', () => { hideContextMenu(); action.fn(); });
    contextMenu.appendChild(btn);
  }
  const top  = Math.min(rect.bottom + 4, window.innerHeight - 100);
  const left = Math.min(rect.left, window.innerWidth - 160);
  contextMenu.style.top  = `${Math.max(top, 8)}px`;
  contextMenu.style.left = `${Math.max(left, 8)}px`;
}

function hideContextMenu() { contextMenu.hidden = true; }
document.addEventListener('click', hideContextMenu);
document.addEventListener('touchstart', (e) => {
  if (!contextMenu.contains(e.target)) hideContextMenu();
}, { passive: true });

// ── 名前変更 ──
async function renameItem(item) {
  showModal('名前を変更', '新しい名前', async (newName) => {
    if (!newName) return;
    const parentPath  = item.path_display.substring(0, item.path_display.lastIndexOf('/'));
    const newFilename = (item['.tag'] === 'file' && !newName.endsWith('.md'))
      ? `${newName}.md` : newName;
    const newPath = `${parentPath}/${newFilename}`;
    try {
      await dbx.filesMoveV2({ from_path: item.path_display, to_path: newPath, autorename: true });
      if (currentPath === item.path_display) {
        currentPath = newPath;
        filenameEl.textContent = newFilename.replace(/\.md$/, '');
      }
      await loadFileTree();
      showToast('名前を変更しました');
    } catch (e) {
      showToast('名前の変更に失敗しました', true);
    }
  });
  modalInput.value = item.name.replace(/\.md$/, '');
}

// ── 移動 ──
async function moveItem(item) {
  showModal('移動先フォルダ（例: /フォルダ名）', '/ または /フォルダ/サブフォルダ', async (dest) => {
    if (dest === '') return;
    const destFull = (dest === '/')
      ? VAULT_ROOT
      : `${VAULT_ROOT}${dest.startsWith('/') ? dest : '/' + dest}`;
    const newPath = `${destFull}/${item.name}`;
    try {
      await dbx.filesMoveV2({ from_path: item.path_display, to_path: newPath, autorename: true });
      if (currentPath === item.path_display) {
        currentPath = newPath;
        filenameEl.textContent = item.name.replace(/\.md$/, '');
      }
      await loadFileTree();
      showToast('移動しました');
    } catch (e) {
      showToast('移動に失敗しました', true);
    }
  });
}

// ── 削除 ──
async function deleteItem(item) {
  modalTitle.textContent = `「${item.name}」を削除しますか？`;
  modalInput.hidden      = true;
  modalOk.textContent    = '削除';
  modalOk.className      = 'btn btn-danger';
  modalOverlay.hidden    = false;
  modalOk.onclick = async () => {
    closeModal();
    try {
      await dbx.filesDeleteV2({ path: item.path_display });
      if (currentPath === item.path_display) {
        currentPath = null; currentEl = null;
        editor.value = '';
        filenameEl.textContent = 'ファイルを選択してください';
      }
      await loadFileTree();
      showToast('削除しました');
    } catch (e) {
      showToast('削除に失敗しました', true);
    }
  };
  modalCancel.onclick = closeModal;
}

// ── 新規ファイル ──
newFileBtn.addEventListener('click', () => {
  showModal('新規ファイル', 'ファイル名', async (name) => {
    if (!name) return;
    const filename = name.endsWith('.md') ? name : `${name}.md`;
    try {
      await dbx.filesUpload({ path: `${VAULT_ROOT}/${filename}`, contents: '', mode: 'add', autorename: true });
      await loadFileTree();
      showToast(`${filename} を作成しました`);
    } catch (e) {
      showToast('作成に失敗しました', true);
    }
  });
});

// ── 新規フォルダ ──
newFolderBtn.addEventListener('click', () => {
  showModal('新規フォルダ', 'フォルダ名', async (name) => {
    if (!name) return;
    try {
      await dbx.filesCreateFolderV2({ path: `${VAULT_ROOT}/${name}`, autorename: true });
      await loadFileTree();
      showToast(`${name} を作成しました`);
    } catch (e) {
      showToast('作成に失敗しました', true);
    }
  });
});

// ── 並び替え・レイアウト（将来用） ──
document.getElementById('sort-btn').addEventListener('click', () => showToast('並び替え：準備中'));
document.getElementById('layout-btn').addEventListener('click', () => showToast('表示切替：準備中'));

// ── モーダル ──
function showModal(title, placeholder, callback) {
  modalTitle.textContent = title;
  modalInput.placeholder = placeholder;
  modalInput.value       = '';
  modalInput.hidden      = false;
  modalOk.textContent    = '作成';
  modalOk.className      = 'btn btn-primary';
  modalOverlay.hidden    = false;
  modalOk.onclick      = () => { const v = modalInput.value.trim(); closeModal(); if (callback) callback(v); };
  modalCancel.onclick  = closeModal;
  modalInput.onkeydown = (e) => {
    if (e.key === 'Enter')  modalOk.onclick();
    if (e.key === 'Escape') closeModal();
  };
  setTimeout(() => modalInput.focus(), 50);
}

function closeModal() {
  modalOverlay.hidden  = true;
  modalInput.hidden    = false;
  modalOk.textContent  = '作成';
  modalOk.className    = 'btn btn-primary';
  modalOk.onclick      = null;
  modalCancel.onclick  = null;
  modalInput.onkeydown = null;
  document.querySelectorAll('#modal-actions .extra-btn').forEach(b => b.remove());
}

// ═══════════════════════════════════════════
// エディタ
// ═══════════════════════════════════════════

const wikilinkRenderer = {
  name: 'wikilink',
  level: 'inline',
  start: (src) => src.indexOf('[['),
  tokenizer(src) {
    const match = src.match(/^\[\[([^\]]+)\]\]/);
    if (match) return { type: 'wikilink', raw: match[0], text: match[1] };
  },
  renderer: (token) => `<span class="wikilink">${token.text}</span>`,
};
marked.use({ extensions: [wikilinkRenderer] });

function renderPreview() {
  preview.innerHTML = marked.parse(editor.value);
}

previewBtn.addEventListener('click', () => {
  const isPreview = !preview.hidden;
  if (isPreview) {
    preview.hidden = true;
    editor.hidden  = false;
    previewBtn.classList.remove('active');
    previewBtn.title = 'プレビュー';
  } else {
    renderPreview();
    editor.hidden  = true;
    preview.hidden = false;
    previewBtn.classList.add('active');
    previewBtn.title = '編集に戻る';
  }
});

let isDirty   = false;
let saveTimer = null;

async function saveFile() {
  if (!currentPath || !isDirty) return;
  saveStatusEl.textContent = '保存中…';
  try {
    const content = new TextEncoder().encode(editor.value);
    await dbx.filesUpload({
      path:     currentPath,
      contents: content,
      mode:     { '.tag': 'overwrite' },
    });
    isDirty = false;
    saveStatusEl.textContent = '保存済み';
    setTimeout(() => { if (!isDirty) saveStatusEl.textContent = ''; }, 2000);
  } catch (e) {
    saveStatusEl.textContent = '';
    showToast('保存に失敗しました', true);
  }
}

editor.addEventListener('input', () => {
  if (!currentPath) return;
  isDirty = true;
  saveStatusEl.textContent = '編集中…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveFile, 2000);
});

async function confirmUnsaved() {
  return new Promise((resolve) => {
    modalTitle.textContent = '未保存の変更があります';
    modalInput.hidden      = true;
    modalOk.textContent    = '保存して切り替え';
    modalOk.className      = 'btn btn-primary';
    modalOverlay.hidden    = false;

    const skipBtn = document.createElement('button');
    skipBtn.textContent = '保存せず切り替え';
    skipBtn.className   = 'btn btn-danger extra-btn';
    modalOk.before(skipBtn);

    skipBtn.onclick     = () => { isDirty = false; closeModal(); resolve(true); };
    modalOk.onclick     = async () => { closeModal(); await saveFile(); resolve(true); };
    modalCancel.onclick = () => { closeModal(); resolve(false); };
  });
}

window.addEventListener('beforeunload', (e) => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// ── トースト ──
let toastTimer = null;
function showToast(message, isError = false) {
  toastEl.textContent = message;
  toastEl.className   = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.className = ''; }, 3000);
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

boot();
</script>
